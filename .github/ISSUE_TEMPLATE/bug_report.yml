name: 🐛 Bug Report
description: Something is broken in the web app, the CLI, or the core library.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      heading: Thanks for reporting a bug! 🐛
      value: |
        Please fill in the template below. **For security issues, do NOT use this form** —
        follow [SECURITY.md](../../SECURITY.md) instead.

  - type: dropdown
    id: component
    attributes:
      label: Where did the bug happen?
      description: Pick the surface that misbehaved.
      options:
        - Web app (security.germondai.com / `apps/web`)
        - CLI (`gsec` / `apps/cli`)
        - Core library (`@germondai/security` / `packages/security`)
        - Build / tooling / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD`, or the deployed URL / CLI version.
      placeholder: "main @ abc1234 — or — security.germondai.com @ 2026-06-27 — or — gsec 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: I generated a 24-character password with `--no-symbols` and it produced…
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps, commands, or code to reproduce the bug.
      placeholder: |
        1. `bunx gsec gen password --length 24 --no-symbols`
        2. Observe that the output contains a `&` character
        3. Expected: only [a-zA-Z0-9]
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Bun/Node version, browser (for web issues).
      placeholder: "macOS 15.5 · Bun 1.3.14 · Chrome 138"
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: Page URL (web only)
      description: If the bug is on the web app, the URL where it happens.
    validations:
      required: false

  - type: attachments
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Helpful for UI bugs. Drag-drop or paste to upload.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help — links, related issues, workarounds.
    validations:
      required: false
