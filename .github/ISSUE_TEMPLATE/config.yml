# Configuration for the repository's issue chooser.
# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository

blank_issues_enabled: false
contact_links:
  - name: 🔐 Report a security vulnerability (private)
    url: https://github.com/germondai/security/security/advisories/new
    about: Use this for any security-sensitive issue. Do NOT use the public issue forms.

  - name: 💬 GitHub Discussions
    url: https://github.com/germondai/security/discussions
    about: Questions, ideas, and general conversation about the project.
